services:
  firestore:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:437.0.1-emulators
    command:
      [
        "/bin/bash",
        "-c",
        "gcloud emulators firestore start --host-port=0.0.0.0:8080",
      ]
    ports:
      - 8080:8080
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
