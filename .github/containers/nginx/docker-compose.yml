services:
  app:
    build: .
    image: nginx-hello-world:local
    ports:
      - 8080:8080
      - 8081:8081
      - 8082:8082
    healthcheck:
      test: ["CMD-SHELL", "service nginx status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
