---
name: Benchmarks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref || github.run_id }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # ===========================
  # Aggregate Benchmark Results
  # ===========================
  benchmarks:
    runs-on: ubuntu-24.04
    if: always() # Always run, even on cancellation or failure
    needs:
      - benchmark

    steps:
      - name: Status
        run: |
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Workflow cancelled."
            exit 1
          elif [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed."
            exit 1
          else
            echo "All jobs completed successfully."
            exit 0
          fi

  # ==================================
  # Benchmarks Run Directly On Runners
  # ==================================
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    env:
      ASV_FACTOR: "1.1"
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # 7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # 7.0.0
        with:
          python-version: "${{ matrix.python }}"

      - name: Fetch git tags
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --tags origin

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install asv virtualenv

      - name: Configure Machine Information
        run: |
          asv machine --yes

      - name: Run Benchmark
        run: |
          echo "Running continuous benchmarking between base commit ${BASE_SHA} and head commit ${HEAD_SHA}"
          asv continuous \
            --show-stderr \
            --split \
            --factor "${ASV_FACTOR}" \
            --python=${{ matrix.python }} \
            "${BASE_SHA}" "${HEAD_SHA}"
