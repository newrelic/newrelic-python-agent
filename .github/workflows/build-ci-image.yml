---
name: Build CI Image

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: "15 16 * * 0" # At 16:15 UTC on Sunday
  pull_request: # Trigger test builds on pull requests, but only when relevant files change.
    paths:
      - ".github/containers/ci/**"
      - ".github/workflows/build-ci-image.yml"
    branches:
      - main
  push: # Trigger rebuilds when pushing relevant files to main.
    paths:
      - ".github/containers/ci/**"
      - ".github/workflows/build-ci-image.yml"
    branches:
      - main
    # Do not run when a tag is created.
    tags-ignore:
      - "**"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            cache_tag: linux-amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            cache_tag: linux-arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    name: Docker Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # 4.2.0

      # Lowercase image name and append -ci
      - name: Generate Image Name
        id: image-name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}-ci" >>"${GITHUB_OUTPUT}"

      - name: Generate Docker Metadata (Tags and Labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # 6.2.0
        with:
          images: ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }}
          flavor: |
            prefix=
            suffix=
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYY-MM-DD'}}
            type=sha,format=short,prefix=sha-
            type=sha,format=long,prefix=sha-
            type=ref,event=pr

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # 4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image by Digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # 7.3.0
        with:
          context: .github/containers/ci
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export Digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload Digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: digests-${{ matrix.cache_tag }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build

    name: Docker Merge Image

    steps:
      - name: Download Digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # 4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # 4.2.0

      # Lowercase image name and append -ci
      - name: Generate Image Name
        id: image-name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}-ci" >>"${GITHUB_OUTPUT}"

      - name: Generate Docker Metadata (Tags and Labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # 6.2.0
        with:
          images: ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }}
          flavor: |
            prefix=
            suffix=
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYY-MM-DD'}}
            type=sha,format=short,prefix=sha-
            type=sha,format=long,prefix=sha-
            type=ref,event=pr

      - name: Create Manifest List and Push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect Image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
