---
name: Build CI Image

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: "15 16 * * 0" # At 16:15 UTC on Sunday
  pull_request: # Trigger test builds on pull requests, but only when relevant files change.
    paths:
      - ".github/containers/**"
      - ".github/workflows/build-ci-image.yml"
  push: # Trigger rebuilds when pushing relevant files to main.
    paths:
      - ".github/containers/**"
      - ".github/workflows/build-ci-image.yml"
    branches:
      - main
    # Do not run when a tag is created.
    tags-ignore:
      - "**"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            cache_tag: linux-amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            cache_tag: linux-arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    name: Docker Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # 4.0.0

      # Lowercase image name and append -ci
      - name: Generate Image Name
        id: image-name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}-ci" >>"${GITHUB_OUTPUT}"

      - name: Generate Docker Metadata (Tags and Labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # 6.0.0
        with:
          images: ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }}
          flavor: |
            prefix=
            suffix=
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYY-MM-DD'}}
            type=sha,format=short,prefix=sha-
            type=sha,format=long,prefix=sha-
            type=ref,event=pr

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # 4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image by Digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # 7.0.0
        with:
          context: .github/containers
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export Digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload Digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: digests-${{ matrix.cache_tag }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build

    name: Docker Merge Image

    steps:
      - name: Download Digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # 4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # 4.0.0

      # Lowercase image name and append -ci
      - name: Generate Image Name
        id: image-name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}-ci" >>"${GITHUB_OUTPUT}"

      - name: Generate Docker Metadata (Tags and Labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # 6.0.0
        with:
          images: ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }}
          flavor: |
            prefix=
            suffix=
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYY-MM-DD'}}
            type=sha,format=short,prefix=sha-
            type=sha,format=long,prefix=sha-
            type=ref,event=pr

      - name: Create Manifest List and Push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect Image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ steps.image-name.outputs.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
